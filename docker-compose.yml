# Temporal dev server runs locally via CLI (not containerized).
#
# Local:       docker compose up --build
# Encryption:  BANKING_ENCRYPT=1 docker compose --profile encrypt up --build
# Cloud:       Set TEMPORAL_ADDRESS, TEMPORAL_NAMESPACE, and auth env vars

services:
  # -- Backend API (FastAPI) --
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-host.docker.internal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_API_KEY=${TEMPORAL_API_KEY:-}
      - TEMPORAL_CERT_PATH=${TEMPORAL_CERT_PATH:+/certs/client.pem}
      - TEMPORAL_KEY_PATH=${TEMPORAL_KEY_PATH:+/certs/client.key}
      - TEMPORAL_TASK_QUEUE=${TEMPORAL_TASK_QUEUE:-}
    volumes:
      - ${TEMPORAL_CERT_PATH:-/dev/null}:/certs/client.pem:ro
      - ${TEMPORAL_KEY_PATH:-/dev/null}:/certs/client.key:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

  # -- Worker (Python) --
  worker-python:
    build:
      context: .
      dockerfile: docker/worker-python.Dockerfile
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-host.docker.internal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_API_KEY=${TEMPORAL_API_KEY:-}
      - TEMPORAL_CERT_PATH=${TEMPORAL_CERT_PATH:+/certs/client.pem}
      - TEMPORAL_KEY_PATH=${TEMPORAL_KEY_PATH:+/certs/client.key}
      - TEMPORAL_TASK_QUEUE=${TEMPORAL_TASK_QUEUE:-}
      - BANKING_BACKEND_URL=http://backend:8000
      - BANKING_ENCRYPT=${BANKING_ENCRYPT:-}
    volumes:
      - ${TEMPORAL_CERT_PATH:-/dev/null}:/certs/client.pem:ro
      - ${TEMPORAL_KEY_PATH:-/dev/null}:/certs/client.key:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy

  # -- Codec Server (only when BANKING_ENCRYPT=1) --
  codec-server:
    build:
      context: .
      dockerfile: docker/worker-python.Dockerfile
    command: ["uv", "run", "--package", "banking-demo-workflows", "python", "-m", "banking_workflows.codec_server"]
    ports:
      - "8081:8081"
    profiles:
      - encrypt
    depends_on:
      backend:
        condition: service_healthy

  # -- Frontend (nginx + static build) --
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
